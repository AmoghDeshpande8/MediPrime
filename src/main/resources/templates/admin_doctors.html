<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pending Doctors</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
        }

        .sidebar {
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            margin: 15px 0;
            text-decoration: none;
            font-size: 16px;
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        .content {
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- 🔹 Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>Admin Panel</h4>
            <a href="/SPRING/dashboard">Dashboard</a>
            <a href="#">Manage Doctors</a>
            <a href="/SPRING/allAppointments">Total Appointments</a>
            <a href="/SPRING/admin-profile">Profile</a>
            <a href="/SPRING/adminlogout">Logout</a>
        </div>

        <!-- 🔹 Main Content -->
        <div class="col-md-10 content">

            <h2 class="mb-4">Pending Doctor Approvals</h2>
                 <div th:if="${#lists.isEmpty(doctor)}" class="alert alert-warning">
                No Doctor Found For Approval.
            </div>

            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Specialization</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="d : ${doctors}">
                        <td th:text="${d.name}"></td>
                        <td th:text="${d.email}"></td>
                        <td th:text="${d.specialization}"></td>
                        <td>
                            <a th:href="@{/approveDoctor(id=${d.id})}" class="btn btn-success btn-sm">Approve</a>
                            <a th:href="@{/rejectDoctor(id=${d.id})}" class="btn btn-danger btn-sm">Reject</a>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>
</div>

</body>
</html>
