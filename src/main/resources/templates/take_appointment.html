

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient Dashboard</title>

    <!-- ✅ Bootstrap CDN (important) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            margin: 15px 0;
            text-decoration: none;
            font-size: 16px;
        }

        .sidebar a:hover {
            color: #1abc9c;
        }

  .card {
            width: 400px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background: #4facfe;
            color: white;
        }

        .btn-custom:hover {
            background: #007bff;
            }

        .topbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- 🔹 Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>Patient Panel</h4>
            <a href="/SPRING/patientDashboard">Dashboard</a>
            <a href="/SPRING/takeAppointment">Take Doctor Appointment</a>
            <a href="#">Doctors</a>
            <a href="/SPRING/patient-profile">Profile</a>
            <a href="/SPRING/patlogout">Logout</a>
        </div>

        <!-- 🔹 Main -->
        <div class="col-md-10 p-4">
<div class="card">
    <h3 class="text-center mb-3">Book Appointment</h3>

    <p class="text-success text-center" th:text="${success}"></p>

    <form th:action="@{/bookAppointment}" method="post">

        <!-- Doctor Dropdown -->
        <div class="mb-3">
            <label>Select Doctor</label>
            <select name="doctorId" class="form-control" required>
                <option value="">-- Select Doctor --</option>
                <option th:each="doc : ${doctors}"
                        th:value="${doc.id}"
                        th:text="${doc.name}">
                </option>
            </select>
        </div>

        <!-- Date -->
        <div class="mb-3">
            <label>Select Date</label>
            <input type="date" id="appointmentDate" name="date" class="form-control" required>
        </div>
        
        
        <div class="mb-3">
    <label>Select Time Slot</label>
    <select name="time"  class="form-control" required>
        <option value="">-- Select Time Slot --</option>
        <option value="10AM-12PM">10 AM - 12 PM</option>
        <option value="12PM-2PM">12 PM - 2 PM</option>
        <option value="2PM-4PM">2 PM - 4 PM</option>
        <option value="4PM-6PM">4 PM - 6 PM</option>
    </select>
</div>
         <div class="mb-3">
            <label>description</label>
            <input type="text" name="description" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-custom w-100">Book Appointment</button>
    </form>
</div>
        

           
          
       

    

        </div>
    </div>
</div>
<script>
    let today = new Date().toISOString().split("T")[0];
    document.getElementById("appointmentDate").setAttribute("min", today);
    
</script>
</body>
</html>
