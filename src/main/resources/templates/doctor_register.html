<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-box {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        .register-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-custom {
            width: 100%;
            background-color: #4facfe;
            color: white;
        }

        .btn-custom:hover {
            background-color: #007bff;
        }
    </style>
</head>

<body>

<div class="register-box">

    <h2>Register Doctor</h2>

    <!-- Messages -->
    <p class="text-danger text-center" th:text="${error}"></p>
    <p class="text-primary text-center" th:text="${msg}"></p>

    <form th:action="@{/doctor-api/register}" method="post">

        <div class="mb-3">
            <label>Full Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Specialization</label>
            <input type="text" name="Specialization"  class="form-control" required>
        </div>

		<div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" th:value="${email}" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>


        <div class="mb-3">
            <label>Contact</label>
            <input type="tel" name="contact" class="form-control" pattern="[0-9]{10}" maxlength=10 placeholder="Enter 10 digit" required>
        </div>
        
        <div class="mb-3">
            <label>Experience</label>
            <input type="number" name="experience" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label>Qualification</label>
            <input type="text" name="qualification"  class="form-control" required>
        </div>
        

        <button type="submit" class="btn btn-custom">Register</button>
    </form>

    <br>

    <p class="text-center">
        Already have account? <a th:href="@{/doctor-api/doctor_login}">Login Here</a>
    </p>

</div>

</body>
</html>
