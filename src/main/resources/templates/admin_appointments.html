<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Appointments</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            margin: 15px 0;
            text-decoration: none;
            font-size: 16px;
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        .content {
            padding: 30px;
        }

        .table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .btn-back {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- 🔹 Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>Admin Panel</h4>
            <a href=".SPRING/dashboard">Dashboard</a>
            <a href="/SPRING/pendingDoctors">Manage Doctors</a>
            <a href="#">Total Appointments</a>
            <a href="/SPRING/admin-profile">Profile</a>
            <a href="/SPRING/adminlogout">Logout</a>
        </div>


        <div class="col-md-10 content">

          

            <h2>All Appointments</h2>

            <div th:if="${#lists.isEmpty(appointments)}" class="alert alert-warning">
                No appointments found.
            </div>

            <table class="table table-bordered table-hover"
                   th:if="${!#lists.isEmpty(appointments)}">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Doctor</th>
                        <th>Patient</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="a : ${appointments}">
                        <td th:text="${a.id}"></td>
                        <td th:text="${a.doctor.name}"></td>
                        <td th:text="${a.patient.name}"></td>
                        <td th:text="${a.date}"></td>
                        <td>
                            <span th:text="${a.status}"
                                  th:classappend="${a.status == 'CONFIRMED'} ? 'badge bg-success' : 'badge bg-warning'">
                            </span>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>
</div>

</body>
</html>
